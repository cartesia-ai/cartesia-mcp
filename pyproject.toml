[project]
name = "cartesia-mcp"
version = "0.1.12"
description = "The official Cartesia MCP server"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    # SDK v3 moved modules (e.g. cartesia.core); server still targets v2 APIs — pin until migrated.
    "cartesia>=2.0.2,<3.0.0",
    "httpx>=0.28.1",
    "mcp[cli]>=1.7.1",
]

[project.scripts]
cartesia-mcp = "cartesia_mcp.server:main"

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"
