# Publishes to PyPI using a project-scoped API token stored as a GitHub secret.
# Add PYPI_API_TOKEN to the repo (or pypi environment) under Settings → Secrets.
#
# Triggered when a GitHub release is published (e.g. by release-please).
# Can also be run manually to re-publish if a prior run failed.
name: Publish PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4 # v6.7.0
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
